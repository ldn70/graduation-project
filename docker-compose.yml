version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: gp-mysql
    environment:
      MYSQL_DATABASE: graduation_project
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7
    container_name: gp-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gp-backend
    environment:
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: "*"
      DB_ENGINE: mysql
      DB_NAME: graduation_project
      DB_USER: root
      DB_PASSWORD: root
      DB_HOST: mysql
      DB_PORT: 3306
    depends_on:
      - mysql
      - redis
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gp-frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  mysql_data:
